name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

env:
  NODE_VERSION: '24'

permissions:
  contents: read

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install CocoaPods
        run: bundle exec pod install --project-directory=ios

      - name: Build unsigned app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/artifacts
          xcodebuild \
            -workspace ios/DBOnline.xcworkspace \
            -scheme DBOnline \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | tee build/artifacts/xcodebuild.log

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/DBOnline.app"
          test -d "$APP_PATH" || { echo "Missing app bundle: $APP_PATH" >&2; exit 1; }

          rm -rf build/Payload
          mkdir -p build/Payload build/artifacts/dSYMs
          cp -R "$APP_PATH" build/Payload/DBOnline.app
          (cd build && zip -qry artifacts/DBOnline-unsigned.ipa Payload)

          shopt -s nullglob
          for dsym in build/DerivedData/Build/Products/Release-iphoneos/*.dSYM; do
            cp -R "$dsym" build/artifacts/dSYMs/
          done
          test -f build/artifacts/DBOnline-unsigned.ipa

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: DBOnline-unsigned-ios
          path: build/artifacts/
          retention-days: 14
          if-no-files-found: error
